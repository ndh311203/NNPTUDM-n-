<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập / Đăng Ký - SPATC Pet Shop</title>
  <meta name="description" content="Đăng nhập hoặc tạo tài khoản SPATC Pet Shop" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="spinner-overlay" class="spinner-overlay"><div class="spinner"></div></div>
  <div id="toast-area" class="toast-area"></div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="emoji">🐾</div>
        <h2 class="gradient-text">SPATC Pet Shop</h2>
        <p class="text-muted text-sm" style="margin-top:4px;">Chăm sóc thú cưng tận tâm</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Đăng nhập</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
      </div>

      <!-- Form Đăng nhập -->
      <form class="auth-form active" id="form-login" onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="login-email" type="email" class="form-control" placeholder="email@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input id="login-password" type="password" class="form-control" placeholder="••••••••" required minlength="6" />
        </div>
        <button type="submit" id="btn-login" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
          🔑 Đăng nhập
        </button>
        <div class="auth-divider">hoặc</div>
        <a href="index.html" class="btn btn-secondary btn-block">← Về trang chủ</a>
      </form>

      <!-- Form Đăng ký -->
      <form class="auth-form" id="form-register" onsubmit="doRegister(event)">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Họ và tên <span style="color:var(--danger)">*</span></label>
            <input id="reg-hoten" type="text" class="form-control" placeholder="Nguyễn Văn A" required />
          </div>
          <div class="form-group">
            <label class="form-label">Số điện thoại <span style="color:var(--danger)">*</span></label>
            <input id="reg-phone" type="tel" class="form-control" placeholder="0909123456" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span style="color:var(--danger)">*</span></label>
          <input id="reg-email" type="email" class="form-control" placeholder="email@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu <span style="color:var(--danger)">*</span></label>
          <input id="reg-password" type="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label">Xác nhận mật khẩu</label>
          <input id="reg-confirm" type="password" class="form-control" placeholder="Nhập lại mật khẩu" required />
        </div>
        <button type="submit" id="btn-register" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
          🚀 Tạo tài khoản
        </button>
        <div class="auth-divider">hoặc</div>
        <a href="index.html" class="btn btn-secondary btn-block">← Về trang chủ</a>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Nếu đã đăng nhập rồi thì redirect
    if (isLoggedIn()) window.location.href = 'index.html';

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
    }

    // Đăng nhập
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.textContent = '⏳ Đang xử lý...';
      showLoading();
      try {
        const res = await Auth.login({ email, password });
        if (res.success) {
          showToast('Đăng nhập thành công!', `Chào mừng ${res.data.taiKhoan.hoTen || email}`, 'success');
          setTimeout(() => {
            // Admin đi thẳng vào trang admin
            if (isAdmin()) {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'shop.html';
            }
          }, 1000);
        }
      } catch (err) {
        showToast('Đăng nhập thất bại', err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '🔑 Đăng nhập';
      } finally {
        hideLoading();
      }
    }

    // Đăng ký
    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-register');
      const hoTen = document.getElementById('reg-hoten').value.trim();
      const soDienThoai = document.getElementById('reg-phone').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (password !== confirm) {
        showToast('Mật khẩu không khớp', 'Vui lòng nhập lại mật khẩu xác nhận', 'warning');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Đang tạo tài khoản...';
      showLoading();
      try {
        const res = await Auth.register({ email, password, hoTen, soDienThoai });
        if (res.success) {
          // Tự động login sau khi đăng ký thành công
          await Auth.login({ email, password });
          showToast('Đăng ký thành công!', `Chào mừng ${hoTen} đến với SPATC!`, 'success');
          setTimeout(() => window.location.href = 'shop.html', 1000);
        }
      } catch (err) {
        showToast('Đăng ký thất bại', err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '🚀 Tạo tài khoản';
      } finally {
        hideLoading();
      }
    }
  </script>
</body>
</html>
